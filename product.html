<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="icon" type="image/jpg" sizes="32x32" href="images/logo.jpg" />
        <title>Our Products</title>

        <link rel="stylesheet" type="text/css" href="style.css">
        <style>
             * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: #eeeff2;
                color: black;
                line-height: 1.6;
            }

            ul {
                    margin-left: 600px;
                    margin-top: -50px;
                    margin-bottom: 50px;
                    padding: 0px;
                    font-size: 16px;
                    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            }

            h1 img {
                border-radius: 50%;
            }

            img[src="images/products.jpg"] {
                object-fit: cover;
            }

            form {
                width: 80%;
                max-width: 1000px;
                margin: 40px auto;
                background: white;
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.08);
            }

            fieldset {
                border: 2px solid #323232;
                padding: 25px;
                margin-bottom: 20px;
                border-radius: 8px;
            }

            legend {
                font-weight: bold;
                color: #7EC521;
                padding: 0 10px;
                font-size: 24px;
                font-style: oblique;
            }

            label {
                font-weight: 700;
                display: inline-block;
                margin-bottom: 5px;
            }

            select,
            input[type="text"],
            textarea {
                width: 100%;
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 6px;
                margin-top: 5px;
                margin-bottom: 15px;
                font-size: 14px;
            }

            input:focus,
            select:focus,
            textarea:focus {
                outline: none;
                border-color: #7EC521;
                box-shadow: 0px 0px 5px rgba(252, 160, 15, 0.4);
            }

            textarea {
                resize: none;
            }

            button {
                border: none;
                padding: 12px 25px;
                border-radius: 6px;
                cursor: pointer;
                font-weight: bold;
                margin-right: 10px;
            }

            button[type="submit"] {
                background: #7EC521;
                color: white;
            }

            button[type="submit"]:hover {
                background: #6ab11b;
                color: white;
            }

            button[type="reset"] {
                background: #ccc;
            }

            button[type="reset"]:hover {
                background: #999;
            }
        </style>
    </head>

    <body>
        
        <a href="index.html"><h1><img src="images/logo.jpg" width="50" height="50" alt="logo"> Ahmedino Real Estate</h1></a>

        <ul style="list-style-type: none;">
            <li><a href="index.html">Home</a></li>
            <li><a href="aboutus.html">About Us</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="product.html">Product</a></li>
            <li><a href="contactus.html">Contact Us</a></li>
            <li><a href="google.html">Google</a></li>
        </ul>

        <img src="images/products.jpg" width="100%" height="400" alt="image"/>  <br/> <br /> <br />

        <form  action="#" method="POST" name="registrationForm">
            <fieldset>
                <legend>Work Experience</legend>
                <label>*Country:</label>
                &nbsp; &nbsp; &nbsp; &nbsp;<select name="country">
                    <option value="select your country">Selecet your country</option>
                    <option value="nigeria" selected>Nigeria</option>
                    <option value="ghana">Ghana</option>
                    <option value="kenya">Kenya</option>
                    <option value="southAfrica">South Africa</option>
                    <option value="qatar">Qatar</option>
                    <option value="kenya">Kenya</option>
                </select> <br /> <br />

                <label>*city/place</label>
                &nbsp; &nbsp; &nbsp;<select name="city">
                    <option value="select your city/place">Select your city/place</option>
                    <option value="lagos">Lagos</option>
                    <option value="abuja">Abuja</option>
                    <option value="ibadan" selected>Ibadan</option>
                    <option value="portHarcourt">Port Harcourt</option>
                    <option value="kano">Kano</option>
                    <option value="ekiti">Ekiti</option>
                </select>
            </fieldset> <br /> <br />

            <fieldset>
                <legend>Employment Details</legend>
                <label>*Type of Business:</label>
                &nbsp; &nbsp;&nbsp; &nbsp; &nbsp;&nbsp; &nbsp; &nbsp; &nbsp; &nbsp;<select name="businessType">
                    <option value="select your type of business">Select your type of business</option>
                    <option value="privateSector" selected>Private Sector</option>
                    <option value="banking">Banking</option>
                    <option value="education">Education</option>
                    <option value="healthcare">Healthcare</option>
                    <option value="technology">Technology</option>
                    <option value="hospital">Hospital</option>
                </select> <br /> <br />

                <label>*Employment type:</label>
                &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&nbsp; &nbsp; &nbsp;<select name="employment">
                    <option value="select your job title">Select your job title</option>
                    <option value="fullTime">Full Time</option>
                    <option value="partTime" selected>Part Time</option>
                    <option value="dpp">Dpp</option>
                    <option value="staff">Staff</option>
                    <option value="intern">Intern</option>
                </select> <br /> <br />

                <label>please provide information</label>
                &nbsp; &nbsp; <input type="text" placeholder="please provide information"/> <br /> <br />

                <label>Summary of duties, including <br />detail of supervisory/ managerial <br />
                    responsibilities and number and kind of employees <br />
                    directly supervised by you <br /> <br>
                </label>

                <textarea name="summary" rows="5" cols="30" maxlength="1000" placeholder="Enter summary of duties"></textarea> <br />
                <label>(please enter a maximum of 1000 characters)</label>
            </fieldset> <br /> 

            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </form>


    </body>
</html>
