<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown</title>

<style>
    .dropdown {
        position: relative;
        display: inline-block;
        padding: 10px;
        left: 500px;
        
    }
    .dropdown p {
        background: green;
        border: 1px solid black;
        color: white;
        padding: 20px;
        font-size: 18px;
        font-weight: 400;
        text-align: center;
        cursor: pointer;
    }

    .dropdown a {
        display: inline-block;
        text-decoration: none;
        padding: 10px;
    }
    .dropdownContent {
        display: none;
        position: absolute;

    }

    .dropdown:hover .dropdownContent {
        display: block;
    }
</style>

</head>
<body>
    <div class="dropdown">
        <p>About Us</p>
        
        <div class="dropdownContent">
            <a href="#">Our Vission</a>
            <a href="#">Our Mission</a>
            <a href="#">Our Team</a>
        </div>
    </div>
</body>
</html>
